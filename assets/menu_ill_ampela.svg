<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2" />
      <stop offset="100%" stop-color="#fecaca" />
    </linearGradient>
    <filter id="drop2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="500" height="400" fill="url(#bgH)"/>
  
  <!-- Mini Plate / Bowl -->
  <g filter="url(#drop2)">
    <ellipse cx="250" cy="230" rx="130" ry="65" fill="#9ca3af" opacity="0.3"/>
    <ellipse cx="250" cy="225" rx="140" ry="70" fill="#f8fafc"/>
    <ellipse cx="250" cy="225" rx="120" ry="55" fill="#e2e8f0" opacity="0.5"/>
    <ellipse cx="250" cy="225" rx="110" ry="50" fill="#ffffff"/>
  </g>

  <!-- Ampela Pieces (Fried chicken gizzards/livers) -->
  <g transform="translate(210, 205)">
    <!-- Piece 1 -->
    <path d="M -20 20 C -40 0 0 -30 30 -10 C 50 10 20 40 -20 20 Z" fill="#7f1d1d"/>
    <path d="M 0 -10 C -10 -20 -20 0 -10 10" stroke="#991b1b" stroke-width="4" fill="none"/>
    
    <!-- Piece 2 -->
    <path d="M 40 25 C 20 10 50 -20 70 -5 C 90 15 60 40 40 25 Z" fill="#991b1b"/>
    <path d="M 50 5 C 40 -5 30 15 45 20" stroke="#7f1d1d" stroke-width="4" fill="none"/>

    <!-- Piece 3 -->
    <path d="M -10 -5 C -30 -25 -10 -50 20 -30 C 40 -15 20 10 -10 -5 Z" fill="#7f1d1d"/>

    <!-- Piece 4 (darker fried) -->
    <path d="M 60 -10 C 40 -25 70 -50 90 -30 C 110 -15 80 5 60 -10 Z" fill="#450a0a"/>
    
    <!-- Piece 5 -->
    <path d="M 80 15 C 60 0 90 -20 110 -5 C 130 15 100 30 80 15 Z" fill="#7f1d1d"/>
  </g>

  <!-- Garnish: Rajangan Bawang & Daun Jeruk (Onions & Lime leaves) -->
  <g transform="translate(240, 210)">
    <!-- Fried onion flakes -->
    <circle cx="-40" cy="-40" r="3" fill="#d97706"/>
    <circle cx="20" cy="-35" r="4" fill="#b45309"/>
    <circle cx="50" cy="15" r="2.5" fill="#f59e0b"/>
    <circle cx="-10" cy="20" r="3" fill="#92400e"/>
    
    <!-- Red chilli slices -->
    <ellipse cx="-20" cy="-10" rx="10" ry="4" fill="none" stroke="#ef4444" stroke-width="3" transform="rotate(45, -20, -10)"/>
    <ellipse cx="60" cy="-10" rx="8" ry="3" fill="none" stroke="#ef4444" stroke-width="3" transform="rotate(-30, 60, -10)"/>

    <!-- Green leaves -->
    <path d="M -60 10 C -70 -10 -50 -10 -40 5 Z" fill="#22c55e"/>
    <path d="M -55 5 C -65 -15 -45 -15 -35 0 Z" fill="#16a34a"/>
    
    <path d="M 80 30 C 90 10 110 30 90 40 Z" fill="#22c55e"/>
  </g>
</svg>
