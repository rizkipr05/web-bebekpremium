<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)"/>
  
  <g filter="url(#shadow4)" transform="translate(100, 50)">
    <!-- Plate -->
    <ellipse cx="100" cy="120" rx="90" ry="40" fill="#FFFFFF"/>
    <ellipse cx="100" cy="122" rx="80" ry="32" fill="#F3F4F6"/>
    
    <!-- Ampela pieces -->
    <path d="M 60 100 C 40 90 50 70 70 75 C 90 80 80 100 60 100 Z" fill="#991B1B"/>
    <path d="M 90 115 C 70 105 80 85 100 90 C 120 95 110 115 90 115 Z" fill="#7F1D1D"/>
    <path d="M 130 105 C 110 95 120 75 140 80 C 160 85 150 105 130 105 Z" fill="#B91C1C"/>
    <path d="M 80 90 C 60 80 70 60 90 65 C 110 70 100 90 80 90 Z" fill="#991B1B"/>

    <!-- Onion slice -->
    <path d="M 110 80 Q 120 70 130 80" stroke="#FBBF24" stroke-width="3" fill="none"/>
    
    <circle cx="85" cy="100" r="3" fill="#10B981"/>
    <circle cx="115" cy="90" r="2" fill="#10B981"/>
    <circle cx="75" cy="90" r="4" fill="#047857"/>
  </g>
  <text x="200" y="270" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#991B1B" text-anchor="middle">Satu Porsi Ampela</text>
</svg>
