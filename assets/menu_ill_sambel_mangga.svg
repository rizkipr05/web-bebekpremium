<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)"/>
  
  <g filter="url(#shadow3)" transform="translate(100, 50)">
    <!-- Plate / Bowl -->
    <ellipse cx="100" cy="130" rx="70" ry="32" fill="#FFFFFF"/>
    <ellipse cx="100" cy="120" rx="60" ry="25" fill="#EF4444"/> <!-- Red Sauce Base -->
    
    <!-- Mango Slices -->
    <path d="M 60 110 Q 80 80 110 115 Q 90 130 60 110 Z" fill="#F59E0B"/>
    <path d="M 80 115 Q 110 90 130 120 Q 100 140 80 115 Z" fill="#FBBF24"/>
    
    <!-- Chili / Herbs -->
    <circle cx="80" cy="110" r="3" fill="#10B981"/>
    <circle cx="120" cy="115" r="4" fill="#991B1B"/>
    <circle cx="95" cy="125" r="2" fill="#10B981"/>
    
    <!-- Whole Mango nearby -->
    <path d="M 120 70 C 130 50 160 50 170 70 C 180 90 160 110 140 100 C 120 90 110 90 120 70 Z" fill="#F59E0B"/>
    <path d="M 160 55 Q 170 40 190 45 Q 185 60 160 55" fill="#10B981"/>
  </g>
  <text x="200" y="270" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#B45309" text-anchor="middle">Sambel Mangga</text>
</svg>
