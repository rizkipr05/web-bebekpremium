<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>
  
  <g filter="url(#shadow2)" transform="translate(100, 50)">
    <!-- Plate -->
    <ellipse cx="100" cy="120" rx="100" ry="45" fill="#FFFFFF"/>
    <ellipse cx="100" cy="122" rx="85" ry="35" fill="#F3F4F6"/>
    
    <!-- Rice -->
    <path d="M 60 110 C 40 100 50 70 80 75 C 100 80 110 70 120 75 C 150 80 150 110 130 115 C 110 120 100 125 60 110 Z" fill="#F9FAFB"/>
    
    <!-- Golden Fried Duck Piece -->
    <path d="M 110 125 C 90 120 80 90 120 95 C 150 100 170 110 160 125 C 150 140 130 130 110 125 Z" fill="#B45309"/>
    <path d="M 90 110 C 100 115 120 100 110 90 Z" fill="#92400E"/>
    
    <!-- Green Sambal/Lalapan -->
    <path d="M 140 85 C 130 75 160 65 170 85 Z" fill="#10B981"/>
    <circle cx="150" cy="80" r="8" fill="#EF4444"/>
  </g>
  <text x="200" y="270" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#B45309" text-anchor="middle">Nasi Bebek Biasa</text>
</svg>
