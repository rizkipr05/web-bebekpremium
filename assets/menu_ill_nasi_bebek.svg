<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="500" height="400" fill="url(#bgG)"/>
  
  <!-- The Plate -->
  <g filter="url(#drop)">
    <!-- Plate base shadow -->
    <ellipse cx="250" cy="220" rx="160" ry="80" fill="#9ca3af" opacity="0.3"/>
    <!-- Outer Plate -->
    <ellipse cx="250" cy="215" rx="170" ry="85" fill="#f8fafc"/>
    <!-- Inner Plate Rim -->
    <ellipse cx="250" cy="215" rx="145" ry="70" fill="#e2e8f0" opacity="0.5"/>
    <!-- Inner Plate -->
    <ellipse cx="250" cy="215" rx="135" ry="65" fill="#ffffff"/>
  </g>

  <!-- Rice (Nasi) -->
  <g transform="translate(180, 180)">
    <!-- Rice mound shadow -->
    <ellipse cx="0" cy="20" rx="55" ry="30" fill="#cbd5e1" opacity="0.8"/>
    <!-- Rice mound -->
    <path d="M -50 15 C -40 -30 40 -30 50 15 C 60 50 -60 50 -50 15 Z" fill="#ffffff"/>
    <path d="M -40 10 C -30 -20 30 -20 40 10" stroke="#f1f5f9" stroke-width="4" fill="none"/>
    <path d="M -20 5 C -10 -15 10 -15 20 5" stroke="#f1f5f9" stroke-width="3" fill="none"/>
    <!-- Bawang Goreng on top -->
    <circle cx="0" cy="-10" r="3" fill="#b45309"/>
    <circle cx="5" cy="-5" r="2" fill="#92400e"/>
    <circle cx="-5" cy="-8" r="2.5" fill="#d97706"/>
    <circle cx="2" cy="-15" r="2" fill="#b45309"/>
  </g>

  <!-- Bebek Goreng (Fried Duck piece) -->
  <g transform="translate(260, 200)">
    <!-- Shadow -->
    <ellipse cx="20" cy="30" rx="60" ry="25" fill="#94a3b8" opacity="0.6"/>
    <!-- Leg bone -->
    <path d="M 50 10 L 90 -20 L 100 -10 Z" fill="#e2e8f0"/>
    <circle cx="95" cy="-15" r="6" fill="#f1f5f9"/>
    <!-- Meat piece body -->
    <path d="M -30 30 C -60 -10 10 -40 50 -10 C 70 10 50 50 10 40 C -10 35 -20 45 -30 30 Z" fill="#b45309"/>
    <!-- Meat highlights/texture -->
    <path d="M -10 20 C -20 0 10 -20 30 0" stroke="#d97706" stroke-width="6" fill="none"/>
    <path d="M 0 10 C 10 -5 20 0 20 10" stroke="#92400e" stroke-width="4" fill="none"/>
  </g>

  <!-- Lalapan (Cucumber & Cabbage) -->
  <g transform="translate(190, 240)">
    <!-- Cucumber slice 1 -->
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="#86efac" stroke="#166534" stroke-width="3"/>
    <circle cx="-5" cy="0" r="1.5" fill="#f0fdf4"/>
    <circle cx="5" cy="0" r="1.5" fill="#f0fdf4"/>
    
    <!-- Cucumber slice 2 -->
    <ellipse cx="25" cy="-5" rx="18" ry="9" fill="#86efac" stroke="#166534" stroke-width="3"/>
    
    <!-- Kemangi leaf -->
    <path d="M 50 -10 C 70 -30 80 -10 60 5 C 40 -5 30 -20 50 -10 Z" fill="#22c55e"/>
    <path d="M 65 -5 C 80 -20 85 -5 70 10 C 55 5 50 -10 65 -5 Z" fill="#16a34a"/>
  </g>

  <!-- Sambal ijo/merah -->
  <g transform="translate(300, 150)">
    <!-- Sambal base -->
    <ellipse cx="0" cy="0" rx="25" ry="12" fill="#ef4444"/>
    <!-- Texture dots -->
    <circle cx="-10" cy="-2" r="2" fill="#b91c1c"/>
    <circle cx="0" cy="3" r="2" fill="#fca5a5"/>
    <circle cx="10" cy="-1" r="1.5" fill="#991b1b"/>
    <circle cx="-3" cy="-5" r="2" fill="#fef2f2"/>
    <circle cx="15" cy="2" r="1.5" fill="#b91c1c"/>
    <!-- Small slice of lime -->
    <ellipse cx="15" cy="-10" rx="12" ry="6" fill="#a3e635"/>
    <path d="M 10 -7 L 20 -13" stroke="#bef264" stroke-width="2"/>
  </g>
</svg>
