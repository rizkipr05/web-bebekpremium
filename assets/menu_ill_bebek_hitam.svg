<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <g filter="url(#shadow)" transform="translate(100, 50)">
    <!-- Plate -->
    <ellipse cx="100" cy="120" rx="100" ry="45" fill="#374151"/>
    <ellipse cx="100" cy="122" rx="85" ry="35" fill="#1F2937"/>
    
    <!-- Rice -->
    <path d="M 60 110 C 40 100 50 70 80 75 C 100 80 110 70 120 75 C 150 80 150 110 130 115 C 110 120 100 125 60 110 Z" fill="#F9FAFB"/>
    
    <!-- Black Spice Duck Piece -->
    <path d="M 110 125 C 90 120 80 90 120 95 C 150 100 170 110 160 125 C 150 140 130 130 110 125 Z" fill="#030712"/>
    <path d="M 90 110 C 100 115 120 100 110 90 Z" fill="#111827"/>
    
    <!-- Garnish -->
    <circle cx="105" cy="85" r="4" fill="#B91C1C"/>
    <circle cx="130" cy="100" r="3" fill="#10B981"/>
    <circle cx="140" cy="110" r="3" fill="#047857"/>
  </g>
  <text x="200" y="270" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#D1D5DB" text-anchor="middle">Bebek Bumbu Hitam</text>
</svg>
